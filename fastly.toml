authors = ["<oss@fastly.com>"]
name = "Authenticate at edge with OAuth"
description = "Connect to an identity provider such as Auth0 using OAuth 2.0 and validate authentication status at the Edge, to authorize access to your edge or origin hosted applications."
language = "rust"
manifest_version = 2

[setup]

  [setup.backends]

    [setup.backends.backend]
      description = "Content or application origin"
      address = "httpbin.org"

    [setup.backends.idp]
      description = "Identity provider authorization server"
      address = "accounts.google.com"

[setup.config_stores]

[setup.config_stores.config]
description = "Configuration metadata store"

[local_server]

[local_server.backends]

[local_server.backends.backend]
url = "https://httpbin.org/"

[local_server.backends.idp]
url = "https://accounts.google.com"

[local_server.config_stores]
[local_server.config_stores.config]
# A config store with two keys:
# jwks :string :REQUIRED – JWKS metadata, JSON-serialized.
# openid_configuration :string :REQUIRED – OpenID Configuration metadata, JSON-serialized.
file = "./example-config.json"
format = "json"